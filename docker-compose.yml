name: satellite-change-detection

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: changedetection
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/changedetection
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/changedetection
      # DEMO_MODE=true seeds synthetic NDVI-derived change events on
      # startup so the stack is demoable with zero internet access.
      # Set to "false" once you have internet access and want
      # POST /api/changes/detect to query the real STAC catalog instead.
      # See DEMO_MODE.md for the full explanation and how to switch over.
      DEMO_MODE: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"

volumes:
  pgdata:
